name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    name: Check (fmt / clippy / test / web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Prepare config for tests
        run: cp config.example.toml config.toml
      - run: cargo test

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile
      - name: Check web formatting and linting
        run: pnpm --dir web check
      - name: Type-check web
        run: pnpm --dir web typecheck
      - name: Build web
        run: pnpm --dir web build

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Build ${{ matrix.target }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - {
              target: x86_64-unknown-linux-gnu,
              os: ubuntu-latest,
              artifact: dizzysync,
            }
          - {
              target: aarch64-unknown-linux-musl,
              os: ubuntu-latest,
              artifact: dizzysync,
              use_cross: true,
            }
          # ── Windows ────────────────────────────────────────────────────────
          - {
              target: x86_64-pc-windows-msvc,
              os: windows-latest,
              artifact: dizzysync.exe,
            }
          - {
              target: aarch64-pc-windows-msvc,
              os: windows-latest,
              artifact: dizzysync.exe,
            }
          # ── macOS ──────────────────────────────────────────────────────────
          - {
              target: x86_64-apple-darwin,
              os: macos-latest,
              artifact: dizzysync,
            }
          - {
              target: aarch64-apple-darwin,
              os: macos-latest,
              artifact: dizzysync,
            }

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: ${{ matrix.use_cross == true && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: dizzysync-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    name: Release
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release archives
        run: |
          for dir in artifacts/dizzysync-*/; do
            target=$(basename "$dir" | sed 's/^dizzysync-//')
            binary=$(find "$dir" -type f | head -1)
            binary_name=$(basename "$binary")

            mkdir "pkg-${target}"
            cp "$binary" "pkg-${target}/${binary_name}"
            cp config.example.toml "pkg-${target}/config.toml"

            cd "pkg-${target}"
            zip "../dizzysync-${target}.zip" "$binary_name" config.toml
            cd ..
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: dizzysync-*.zip
