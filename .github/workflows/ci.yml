name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Prepare config for tests
        run: cp config.example.toml config.toml
      - run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - {
              target: x86_64-unknown-linux-gnu,
              os: ubuntu-latest,
              artifact: dizzysync,
            }
          - {
              target: x86_64-unknown-linux-musl,
              os: ubuntu-latest,
              artifact: dizzysync,
              musl: true,
            }
          - {
              target: aarch64-unknown-linux-gnu,
              os: ubuntu-latest,
              artifact: dizzysync,
              use_cross: true,
            }
          - {
              target: aarch64-unknown-linux-musl,
              os: ubuntu-latest,
              artifact: dizzysync,
              use_cross: true,
            }
          - {
              target: armv7-unknown-linux-gnueabihf,
              os: ubuntu-latest,
              artifact: dizzysync,
              use_cross: true,
            }
          # ── Windows ────────────────────────────────────────────────────────
          - {
              target: x86_64-pc-windows-msvc,
              os: windows-latest,
              artifact: dizzysync.exe,
            }
          - {
              target: aarch64-pc-windows-msvc,
              os: windows-latest,
              artifact: dizzysync.exe,
            }
          # ── macOS ──────────────────────────────────────────────────────────
          - {
              target: x86_64-apple-darwin,
              os: macos-latest,
              artifact: dizzysync,
            }
          - {
              target: aarch64-apple-darwin,
              os: macos-latest,
              artifact: dizzysync,
            }

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.musl == true
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: ${{ matrix.use_cross == true && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: dizzysync-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release archives
        run: |
          for dir in artifacts/dizzysync-*/; do
            target=$(basename "$dir" | sed 's/^dizzysync-//')
            binary=$(find "$dir" -type f | head -1)
            binary_name=$(basename "$binary")

            mkdir "pkg-${target}"
            cp "$binary" "pkg-${target}/${binary_name}"
            cp config.example.toml "pkg-${target}/config.toml"

            cd "pkg-${target}"
            zip "../dizzysync-${target}.zip" "$binary_name" config.toml
            cd ..
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: dizzysync-*.zip
