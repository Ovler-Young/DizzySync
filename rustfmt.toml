# Rustfmt configuration for DizzySync project
# Keep this file limited to stable rustfmt options so CI does not emit warnings.

edition = "2021"
hard_tabs = false
tab_spaces = 4
max_width = 100
use_small_heuristics = "Default"

reorder_imports = true
reorder_modules = true

newline_style = "Unix"
remove_nested_parens = true
use_field_init_shorthand = true
use_try_shorthand = true

force_explicit_abi = true
merge_derives = true
