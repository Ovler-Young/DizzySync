# DizzySync 配置文件示例
# 复制此文件为 config.toml 并修改相应配置

[user]
# 你的 Dizzylab 账号
username = "your_username_here"
password = "your_password_here"

[download]
# 要下载的格式，可选值：["128", "320", "FLAC", "gift"]
# "128" - 128kbps MP3
# "320" - 320kbps MP3
# "FLAC" - 无损FLAC
# "gift" - 特典内容（使用网页会话下载）
formats = ["320", "FLAC"]

# 格式子文件夹组织方式
# false: 创建格式子文件夹，如 "专辑名/@厂牌名/320/文件" 和 "专辑名/@厂牌名/FLAC/文件"
# true: 铺平格式，所有格式文件放在同一目录，如 "专辑名/@厂牌名/文件"
flatten = false

[paths]
# 输出目录
output_dir = "./DizzySync"

# 目录名模板，支持变量：
# {album} - 专辑名
# {label} - 厂牌名
# {authors} - 首曲目的作者名
# {year} - 发布年份
# {date} - 发布日期 (YYYY-MM-DD)
# 支持路径分隔符，如 "{year}/{label}/{album}"
directory_template = "{album}/@{label}"

[behavior]
# 跳过已存在的目录
skip_existing = true

# 单线程下载（推荐保持true以避免给服务器造成压力）
single_threaded = true

# 文件生成选项
generate_readme = true     # 生成README.md文件
generate_nfo = true        # 生成NFO信息文件

# 仅下载元数据
# true: 只下载专辑信息、封面、README和NFO文件，不下载音频文件
# false: 下载完整的专辑内容（默认）
metadata_only = false
