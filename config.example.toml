# DizzySync 配置文件示例
# 复制此文件为 config.toml 并修改相应配置

# 单账号旧格式仍兼容：
# [user]
# username = "your_username_here"
# password = "your_password_here"

# 推荐使用多账号格式。可添加多个 [[users]] 块，DizzySync 会逐个登录并同步。
[[users]]
username = "your_username_here"
password = "your_password_here"

# [[users]]
# username = "another_username_here"
# password = "another_password_here"

[download]
# 要下载的格式，可选值：["128", "320", "FLAC", "gift"]
# "128" - 128kbps MP3
# "320" - 320kbps MP3
# "FLAC" - 无损FLAC
# "gift" - 特典内容（使用网页会话下载）
formats = ["320", "FLAC"]

[paths]
# 输出目录
output_dir = "./DizzySync"

# 目录名模板，支持变量：
# {album} - 专辑名
# {label} - 厂牌名
# {authors} - 首曲目的作者名
# {year} - 发布年份
# {date} - 发布日期 (YYYY-MM-DD)
# 支持路径分隔符，如 "{year}/{label}/{album}"
directory_template = "{album}/@{label}"

[behavior]
# 跳过已存在的目录
skip_existing = true

# 单线程下载（若为true，会在单线程基础上，每下载一个专辑后暂停2秒）
# 若设为false，则由 max_concurrent_albums 控制同时下载的专辑数
single_threaded = true

# 同时下载的最大专辑数（仅在 single_threaded = false 时生效）
max_concurrent_albums = 1

# 文件生成选项
generate_readme = true     # 生成README.md文件
generate_nfo = true        # 生成NFO信息文件

# 仅下载元数据
# true: 只下载专辑信息、封面、README和NFO文件，不下载音频文件
# false: 下载完整的专辑内容（默认）
metadata_only = false

[api]
# API/Web 控制服务监听地址。
# 本地默认使用 127.0.0.1；Docker/Compose 会通过命令行覆盖为 0.0.0.0:8787。
bind = "127.0.0.1:8787"

# 可选 API 访问密钥。设置后请求需携带：
#   X-API-Key: <key>
# 或：
#   Authorization: Bearer <key>
api_key = ""

# Rust 服务托管的前端构建目录。Docker 镜像内为 /app/web。
web_root = "./web/dist"
