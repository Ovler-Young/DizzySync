services:
  dizzysync:
    image: ghcr.io/ovler-young/dizzysync:latest
    container_name: dizzysync
    restart: unless-stopped
    ports:
      - "${DIZZYSYNC_PORT:-8787}:8787"
    environment:
      # Only external configuration required by Docker: the password used to enter the Web UI.
      # Configure Dizzylab credentials, formats, paths, and sync behavior in the Web UI onboarding flow.
      DIZZYSYNC_WEB_PASSWORD: "${DIZZYSYNC_WEB_PASSWORD:?Set DIZZYSYNC_WEB_PASSWORD in .env}"
      DIZZYSYNC_OUTPUT_DIR: /data
    volumes:
      - dizzysync-config:/config
      - ${DIZZYSYNC_DATA_DIR:-./DizzySync}:/data

volumes:
  dizzysync-config:
